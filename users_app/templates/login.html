{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
<title>Login -Taskmate</title>
{% endblock title %}

{% block  content %}

<h2 class = "mt-3" style="margin-left: 60px;"> Login on Taskmate </h2>
 <div class="container">
     <div class="container">
    </br>
    {% if messages%}
        {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
    {{message}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      
</div>
        {% endfor %}
    {% endif%}

    <form method ="POST">
        {% csrf_token %}
        {{form |crispy }}

        <button class ="btn btn-primary mb-6" type ="submit">Login</button>
    </form>
      
{% endblock content %}
