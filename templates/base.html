{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block title %}
    {% endblock title %}
    

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 <link rel="stylesheet" href="styles.css">
 <link rel="icon" href="{% static "images/favicon.ico" %}%}" type ="image/gif" sizes ="16x16">
  <body class ="bg-dark-subtle">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href={% url 'index'%}><img src="{% static 'images/logo.png' %}" style="width:80px; alt ="Taskmate"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href={% url 'index'%}>Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href={% url 'todolist'%}>Todo List</a>
            </li>
            
             <li class="nav-item">
              <a class="nav-link active" href={% url 'contact'%}>Contact Us</a>
            </li>
             <li class="nav-item">
              <a class="nav-link active" href={% url 'about'%}>About Us</a>
            </li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled">Disabled</a>
            </li>
          </ul>
          
        </div>
      </div>
      <div class="ms-auto d-flex align-items-center">
    {% if user.is_authenticated %}
        <span class="text-light me-3">
            {{ user.username }}
        </span>

        <a href="{% url 'logout' %}" class="btn btn-outline-success">
            Logout
        </a>
    {% else %}
    <a href="{% url 'register' %}" class="btn btn-outline-primary me-2">
            Register
        </a>
        <a href="{% url 'login' %}" class="btn btn-outline-success">
            Login
        </a>
    {% endif %}
</div>
    </nav>

   {% block  content %}{% endblock content %}
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>   
  </body>
</html>
